<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ club_name }} 마작 레이팅</title>

  <!-- 파비콘 및 모바일 홈 화면 아이콘 -->
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon.png') }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icon.png') }}">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script>
    window.GAME_CONFIG = {
      start_score: Number('{{ config.MAHJONG_CONFIG.START_SCORE }}'),
      return_score: Number('{{ config.MAHJONG_CONFIG.RETURN_SCORE }}'),
      uma: JSON.parse('{{ config.MAHJONG_CONFIG.UMA | tojson }}'),
      oka: Number('{{ config.MAHJONG_CONFIG.OKA_TO_1ST }}')
    };
  </script>
</head>

<body>

  <!-- 커스텀 확인 모달 (confirm() 대체) -->
  <div id="confirm-modal"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:9999; align-items:flex-start; justify-content:center; padding-top:15vh;">
    <div
      style="background:#fff; border-radius:12px; padding:24px 28px; max-width:340px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,0.2);">
      <p id="confirm-modal-text" style="margin:0 0 20px 0; font-size:14px; line-height:1.6; color:#333;"></p>
      <div style="display:flex; gap:10px; justify-content:flex-end;">
        <button id="confirm-modal-cancel"
          style="padding:6px 16px; border-radius:6px; border:1px solid #ccc; background:#f5f5f5; cursor:pointer; font-size:13px;">취소</button>
        <button id="confirm-modal-ok"
          style="padding:6px 16px; border-radius:6px; border:none; background:#e05050; color:#fff; cursor:pointer; font-size:13px; font-weight:600;">삭제</button>
      </div>
    </div>
  </div>
  <script>
    function showConfirm(message, onOk) {
      const modal = document.getElementById('confirm-modal');
      document.getElementById('confirm-modal-text').textContent = message;
      modal.style.display = 'flex';
      const ok = document.getElementById('confirm-modal-ok');
      const cancel = document.getElementById('confirm-modal-cancel');
      const close = () => { modal.style.display = 'none'; ok.onclick = null; cancel.onclick = null; };
      ok.onclick = () => { close(); onOk(); };
      cancel.onclick = close;
    }
  </script>

  <!-- 상단 헤더: 왼쪽 제목 -->
  <div class="top-bar">
    <h1>{{ club_name }}<br class="mobile-br"> 대회 전용 마작 레이팅</h1>
  </div>

  <!-- ================= 대회 전용 화면 ================= -->
  <div id="tournament-view" class="view">
    <div class="main-layout equal-layout">
      <!-- 왼쪽: 입력 + 게임 데이터 + 규칙 -->
      <div class="left-panel">

        <section class="form-panel">
          <h2>대회 대국 기록 입력</h2>
          <form id="tournament-game-form" method="post" autocomplete="off">
            <div class="row">
              <label>P1(동)</label>
              <input name="player1_name" placeholder="플레이어 1 이름" required>
              <input name="player1_score" type="text" placeholder="pt" required>
            </div>
            <div class="row">
              <label>P2(남)</label>
              <input name="player2_name" placeholder="플레이어 2 이름" required>
              <input name="player2_score" type="text" placeholder="pt" required>
            </div>
            <div class="row">
              <label>P3(서)</label>
              <input name="player3_name" placeholder="플레이어 3 이름" required>
              <input name="player3_score" type="text" placeholder="pt" required>
            </div>
            <div class="row">
              <label>P4(북)</label>
              <input name="player4_name" placeholder="플레이어 4 이름" required>
              <input name="player4_score" type="text" placeholder="pt" required>
            </div>
            <button type="submit">저장</button>
          </form>
        </section>

        <section class="games-panel">
          <div class="games-header">
            <h2>대회 대국 기록</h2>
            <div class="games-header-right">
              <a href="/export_tournament" class="export-link">CSV 내보내기</a>
              <a href="/import_tournament" class="import-link">CSV 가져오기</a>
            </div>
          </div>

          <div class="table-scroll">
            <table class="games-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>시간</th>
                  <th>P1</th>
                  <th>P2</th>
                  <th>P3</th>
                  <th>P4</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="tournament-games-tbody"></tbody>
            </table>
          </div>
        </section>

        <section class="rule-panel">
          <h2>대회 규칙</h2>
          <ul>
            {% for rule in config.RULES_TOURNAMENT %}
            <li>{{ rule }}</li>
            {% endfor %}
          </ul>
        </section>
      </div>

      <!-- 오른쪽: 전체 등수 -->
      <div class="right-panel">
        <section class="ranking-panel">
          <div class="ranking-header">
            <h2>대회 전체 등수</h2>
            <div class="rank-legend">
              <span class="legend-color legend1"></span><span class="legend-text">1등</span>
              <span class="legend-color legend2"></span><span class="legend-text">2등</span>
              <span class="legend-color legend3"></span><span class="legend-text">3등</span>
              <span class="legend-color legend4"></span><span class="legend-text">4등</span>
            </div>
          </div>

          <div class="table-scroll">
            <table class="ranking-table">
              <thead>
                <tr>
                  <th>순위</th>
                  <th>이름</th>
                  <th>대국 수</th>
                  <th>총 pt</th>
                  <th>평균 pt</th>
                  <th>연대율</th>
                  <th>등수 분포</th>
                </tr>
              </thead>
              <tbody id="tournament-ranking-tbody">
                <tr>
                  <td colspan="7" class="ranking-placeholder">통계 없음</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
